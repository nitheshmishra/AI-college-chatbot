<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>RIBS AI Chatbot</title>
  <link rel='stylesheet' href='style.css'>
  <style>
    /* ── History Sidebar ── */
    #history-sidebar {
      position: fixed;
      top: 0; right: -320px;
      width: 300px; height: 100%;
      background: #1a1a2e;
      border-left: 1px solid #2e2e5e;
      z-index: 999;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    #history-sidebar.open { right: 0; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: #16213e;
      border-bottom: 1px solid #2e2e5e;
    }
    .history-header h3 { margin: 0; font-size: 15px; color: #c0c0ff; }

    .history-header-btns { display: flex; gap: 8px; }
    .history-header-btns button {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    .history-header-btns button:hover { background: #2e2e5e; color: #fff; }

    #history-panel {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }
    .history-item {
      display: flex;
      flex-direction: column;
      padding: 9px 10px;
      margin-bottom: 6px;
      background: #16213e;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border 0.2s;
    }
    .history-item:hover { border-color: #5555cc; }
    .history-q {
      font-size: 13px;
      color: #dde;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-time { font-size: 10px; color: #666; margin-top: 3px; }
    .no-history { color: #666; font-size: 13px; text-align: center; margin-top: 30px; }

    /* ── API Key Banner ── */
    #api-key-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: #b91c1c;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    #api-key-banner input {
      flex: 1;
      min-width: 260px;
      padding: 6px 10px;
      border-radius: 5px;
      border: none;
      font-size: 13px;
      background: #1e1e1e;
      color: #fff;
    }
    #api-key-banner button {
      background: #fff;
      color: #b91c1c;
      border: none;
      padding: 6px 14px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    /* ── History toggle button in topbar ── */
    #history-btn {
      background: transparent;
      border: 1px solid #444;
      color: #c0c0ff;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-left: 12px;
    }
    #history-btn:hover { background: #2e2e5e; }

    /* Overlay when sidebar is open */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 998;
    }
    #sidebar-overlay.visible { display: block; }
  </style>
</head>
<body>
  <canvas id='rain'></canvas>

  <!-- Existing topbar — only added history button inside -->
  <div class='topbar'>
    <h2><img src='img.png' width='40px' style='border-radius:50%; vertical-align:middle; margin-right:8px;'>RIBS AI Assistant</h2>
    <div style="display:flex;align-items:center;">
      Welcome, <span id='username' style="margin-left:5px;"></span>
      <button id="history-btn" onclick="toggleHistory(); document.getElementById('sidebar-overlay').classList.toggle('visible')">🕐 History</button>
    </div>
  </div>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" onclick="toggleHistory(false); this.classList.remove('visible')"></div>

  <!-- History Sidebar -->
  <div id="history-sidebar">
    <div class="history-header">
      <h3>🕐 Search History</h3>
      <div class="history-header-btns">
        <button onclick="clearAllHistory()">Clear</button>
        <button onclick="toggleHistory(false); document.getElementById('sidebar-overlay').classList.remove('visible')">✕</button>
      </div>
    </div>
    <div id="history-panel"><p class="no-history">Loading...</p></div>
  </div>

  <!-- Existing chat UI — untouched -->
  <div class='chat-container'></div>
  <div class='prompt-area'>
    <input type='text' id='prompt' placeholder='Ask anything...'>
    <button id='image'>
      <img src='img.svg'>
      <input type='file' accept='images/*' hidden>
    </button>
    <button class='voice-btn' id='voice'>🎤</button>
    <button id='submit'><img src='submit.svg'></button>
  </div>

  <!-- Scripts: database first, then main script -->
  <script src='database.js'></script>
  <script src='script.js'></script>
  <script src='rain.js'></script>
</body>
</html>
